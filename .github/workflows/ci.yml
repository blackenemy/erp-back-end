name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Build, Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          cache: true
          cache-dependency-path: '**/*.csproj'

      - name: Restore dependencies
        run: dotnet restore MiniPricingPlatform.slnx

      - name: Check formatting
        run: dotnet format MiniPricingPlatform.slnx --verify-no-changes

      - name: Run tests
        run: >
          dotnet test MiniPricingPlatform.slnx
          --no-restore
          --configuration Release
          --logger "console;verbosity=normal"
