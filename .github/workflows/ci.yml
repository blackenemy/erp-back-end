name: CI/CD Backend (Main Only)

on:
  push:
    branches: ["main"] # รันเฉพาะตอน push ลง main
  pull_request:
    branches: ["main"] # รันเฉพาะตอนเปิด PR เข้าหา main

jobs:
  check-build-deploy:
    name: Lint, Build, Test & Deploy
    # --- เปลี่ยนมาใช้เครื่อง Runner 108 ของคุณ ---
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore dependencies
        run: dotnet restore MiniPricingPlatform.slnx

      - name: 1️⃣ Check formatting (Lint)
        run: dotnet format MiniPricingPlatform.slnx --verify-no-changes

      - name: 2️⃣ Build projects (Release)
        run: dotnet build MiniPricingPlatform.slnx --no-restore --configuration Release

      - name: 3️⃣ Run tests (Release)
        run: dotnet test MiniPricingPlatform.slnx --no-restore --no-build --configuration Release

      # ==========================================
      # 🚀 ส่วนที่เพิ่มใหม่: Publish & Deployment
      # ==========================================
      - name: 4️⃣ Publish & Deploy to CT 107
        # ทำเฉพาะตอน push/merge ลง main จริงๆ เท่านั้น
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          # 1. สร้างไฟล์สำหรับรันจริง (Publish) ออกมาที่โฟลเดอร์ ./publish
          dotnet publish RuleService/RuleService.csproj -c Release -o ./publish/RuleService
          dotnet publish PricingService/PricingService.csproj -c Release -o ./publish/PricingService

          # 2. ส่งไฟล์ + ecosystem config ไปที่เครื่อง 107 (Backend Node)
          rsync -avz --delete ./publish/ root@10.0.0.8:/var/www/hubs-backend/
          rsync -avz ecosystem.config.js root@10.0.0.8:/var/www/hubs-backend/

          # 3. ล้างตัวเก่า + สตาร์ท PM2 ใหม่
          ssh root@10.0.0.8 "cd /var/www/hubs-backend && pm2 delete hubs-backend hubs-backend-rule hubs-backend-pricing 2>/dev/null; pm2 start ecosystem.config.js --update-env && pm2 save"

      - name: ✅ Status Report
        if: success()
        run: echo "🟢 Backend Deployed Successfully!"
