name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Lint, Build & Test
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
          cache: true
          cache-dependency-path: "**/*.csproj"

      - name: Restore dependencies
        run: dotnet restore MiniPricingPlatform.slnx

      - name: 1️⃣ Check formatting (Lint)
        run: dotnet format MiniPricingPlatform.slnx --verify-no-changes
        continue-on-error: false

      - name: 2️⃣ Build projects (Release)
        run: dotnet build MiniPricingPlatform.slnx --no-restore --configuration Release /p:TreatWarningsAsErrors=true
        continue-on-error: false

      - name: 3️⃣ Run tests (Release)
        run: >
          dotnet test MiniPricingPlatform.slnx
          --no-restore
          --no-build
          --configuration Release
          --logger "console;verbosity=normal"
        continue-on-error: false

      - name: ✅ All checks passed
        if: success()
        run: echo "🟢 CI Pipeline Passed - Ready to merge!"

      - name: ❌ CI Pipeline Failed
        if: failure()
        run: |
          echo "🔴 CI Pipeline Failed!"
          echo ""
          echo "Fix issues in this order:"
          echo "1️⃣  Formatting issues:"
          echo "     dotnet format MiniPricingPlatform.slnx"
          echo ""
          echo "2️⃣  Build errors:"
          echo "     dotnet build MiniPricingPlatform.slnx --configuration Release"
          echo ""
          echo "3️⃣  Test failures:"
          echo "     dotnet test MiniPricingPlatform.slnx --configuration Release"
          exit 1
